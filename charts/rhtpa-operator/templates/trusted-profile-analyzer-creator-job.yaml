{{- if .Values.rhtpa.enabled }}
---
# ServiceAccount for RHTPA
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhtpa
  namespace: {{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "18"
---
# Role for creating TrustedProfileAnalyzer CR
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhtpa-cr-creator
  namespace: {{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "18"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: ["rhtpa.io"]
  resources: ["trustedprofileanalyzers"]
  verbs: ["get", "create", "patch", "update"]
- apiGroups: ["objectbucket.io"]
  resources: ["objectbucketclaims"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhtpa-cr-creator
  namespace: {{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "18"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhtpa-cr-creator
subjects:
- kind: ServiceAccount
  name: rhtpa
  namespace: {{ .Values.rhtpa.namespace }}
---
# Job to create TrustedProfileAnalyzer CR with real credentials
apiVersion: batch/v1
kind: Job
metadata:
  name: rhtpa-cr-creator
  namespace: {{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "20"  # After database and storage are ready
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    metadata:
      name: rhtpa-cr-creator
    spec:
      serviceAccountName: rhtpa
      restartPolicy: OnFailure
      shareProcessNamespace: true  # Allow containers to see each other's processes
      volumes:
      - name: script
        configMap:
          name: rhtpa-cr-creator-script
          defaultMode: 0755
      - name: spiffe-workload-api
        csi:
          driver: "csi.spiffe.io"
          readOnly: true
      - name: spiffe-vault-client
        configMap:
          name: spiffe-vault-client
          defaultMode: 0755
      - name: spiffe-token
        emptyDir: {}
      - name: spiffe-helper-config
        configMap:
          name: spiffe-helper-config
      containers:
      # SPIFFE helper sidecar to generate JWT token
      - name: spiffe-helper
        image: ghcr.io/spiffe/spiffe-helper:nightly
        args:
        - -config
        - /etc/spiffe-helper/config.hcl
        volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: spiffe-token
          mountPath: /run/secrets/spiffe
        - name: spiffe-helper-config
          mountPath: /etc/spiffe-helper
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
      # Main container
      - name: create-cr
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          /scripts/create-cr.sh
          # Signal completion and give time for cleanup
          sleep 3
          # Kill spiffe-helper sidecar to allow Job to complete
          killall spiffe-helper 2>/dev/null || true
        env:
        - name: VAULT_ADDR
          value: {{ .Values.rhtpa.zeroTrust.vault.url | quote }}
        - name: SPIFFE_ENDPOINT_SOCKET
          value: "unix:///spiffe-workload-api/spire-agent.sock"
        volumeMounts:
        - name: script
          mountPath: /scripts
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: spiffe-vault-client
          mountPath: /usr/local/bin/spiffe-vault-client.py
          subPath: spiffe-vault-client.py
        - name: spiffe-token
          mountPath: /run/secrets/spiffe
          readOnly: true
{{- end }}

