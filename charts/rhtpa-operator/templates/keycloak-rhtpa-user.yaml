{{- if and .Values.rhtpa.enabled .Values.rhtpa.zeroTrust.keycloak.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rhtpa-keycloak-user
  namespace: {{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: {{ .Values.global.secretStore.name }}
    kind: {{ .Values.global.secretStore.kind }}
  target:
    name: rhtpa-keycloak-user
    template:
      type: Opaque
      data:
        password: "{{ `{{ .password }}` }}"
  data:
  - secretKey: password
    remoteRef:
      key: {{ .Values.rhtpa.zeroTrust.keycloak.userPasswordVaultKey }}
      property: rhtpa-user-password
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: rhtpa-user-import
  namespace: {{ .Values.rhtpa.zeroTrust.keycloak.namespace | default "keycloak-system" }}
  annotations:
    argocd.argoproj.io/sync-wave: "15"  # After Keycloak realm is created
spec:
  keycloakCRName: {{ .Values.rhtpa.zeroTrust.keycloak.instanceName | default "keycloak" }}
  realm:
    realm: {{ .Values.rhtpa.zeroTrust.keycloak.realm }}
    users:
    - createdTimestamp: 1
      credentials:
      - temporary: false
        type: password
        value: ${RHTPA_USER_PASSWORD}
      email: rhtpa-user@example.com
      emailVerified: true
      enabled: true
      firstName: RHTPA
      lastName: User
      realmRoles:
      - viewer
      username: rhtpa-user
  placeholders:
    RHTPA_USER_PASSWORD:
      secret:
        name: rhtpa-keycloak-user
        key: password
{{- end }}

