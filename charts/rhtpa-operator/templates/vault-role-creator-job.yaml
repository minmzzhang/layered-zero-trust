{{- if .Values.rhtpa.enabled }}
---
# ServiceAccount for Vault role creator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-role-creator
  namespace: {{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "17"
---
# ClusterRole for accessing Vault pods and DNS cluster resource
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-role-creator
  annotations:
    argocd.argoproj.io/sync-wave: "17"
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create"]
- apiGroups: ["config.openshift.io"]
  resources: ["dnses"]
  verbs: ["get"]
---
# ClusterRoleBinding for Vault role creator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-role-creator-{{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "17"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-role-creator
subjects:
- kind: ServiceAccount
  name: vault-role-creator
  namespace: {{ .Values.rhtpa.namespace }}
---
# Job to create Vault JWT roles for RHTPA
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-role-creator
  namespace: {{ .Values.rhtpa.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "17"  # Before rhtpa-cr-creator (wave 18)
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    metadata:
      name: vault-role-creator
    spec:
      serviceAccountName: vault-role-creator
      restartPolicy: OnFailure
      volumes:
      - name: script
        configMap:
          name: vault-role-creator-script
          defaultMode: 0755
      containers:
      - name: create-vault-roles
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - /scripts/create-vault-roles.sh
        volumeMounts:
        - name: script
          mountPath: /scripts
{{- end }}

