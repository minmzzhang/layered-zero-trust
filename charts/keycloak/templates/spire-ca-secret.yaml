{{- if .Values.keycloak.spiffeIdentityProvider.enabled }}
{{- $spireCaConfig := .Values.keycloak.spiffeIdentityProvider.spireCa | default dict }}
{{- $sourceNamespace := $spireCaConfig.sourceNamespace | default "zero-trust-workload-identity-manager" }}
{{- $sourceConfigMap := $spireCaConfig.sourceConfigMap | default "spire-bundle" }}
{{- $sourceKey := $spireCaConfig.sourceKey | default "bundle.crt" }}
{{- $secretName := $spireCaConfig.secretName | default "spire-ca-bundle" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-ca-copy-job
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-ca-copy-source
  namespace: {{ $sourceNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ $sourceConfigMap | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-ca-copy-source
  namespace: {{ $sourceNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-ca-copy-source
subjects:
  - kind: ServiceAccount
    name: spire-ca-copy-job
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-ca-copy-target
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ $secretName | quote }}]
    verbs: ["get", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-ca-copy-target
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-ca-copy-target
subjects:
  - kind: ServiceAccount
    name: spire-ca-copy-job
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spire-ca-copy-{{ now | date "20060102-150405" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: spire-ca-copy-job
      restartPolicy: OnFailure
      containers:
        - name: copy-ca
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              SOURCE_NS={{ $sourceNamespace | quote }}
              SOURCE_CM={{ $sourceConfigMap | quote }}
              SOURCE_KEY={{ $sourceKey | quote }}
              TARGET_NS={{ .Release.Namespace | quote }}
              SECRET_NAME={{ $secretName | quote }}

              echo "Reading SPIRE CA from ConfigMap ${SOURCE_NS}/${SOURCE_CM} key=${SOURCE_KEY}"
              ESCAPED_KEY="${SOURCE_KEY//./\\.}"
              CA_CERT=$(oc get configmap "${SOURCE_CM}" -n "${SOURCE_NS}" -o jsonpath="{.data.${ESCAPED_KEY}}")

              if [[ -z "${CA_CERT}" ]]; then
                echo "ERROR: No certificate data found in ${SOURCE_NS}/${SOURCE_CM}[${SOURCE_KEY}]"
                exit 1
              fi

              echo "Certificate found ($(echo "${CA_CERT}" | wc -c) bytes)"
              echo "${CA_CERT}" | openssl x509 -noout -subject -issuer

              echo "Creating/updating Secret ${TARGET_NS}/${SECRET_NAME}"
              oc delete secret "${SECRET_NAME}" -n "${TARGET_NS}" --ignore-not-found
              oc create secret generic "${SECRET_NAME}" \
                --from-literal="spire-ca.pem=${CA_CERT}" \
                -n "${TARGET_NS}"
              oc label secret "${SECRET_NAME}" -n "${TARGET_NS}" \
                app.kubernetes.io/managed-by=spire-ca-copy-job \
                app.kubernetes.io/component=spire-ca \
                --overwrite

              echo "SUCCESS: SPIRE CA certificate stored in Secret ${TARGET_NS}/${SECRET_NAME}"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
{{- end }}
